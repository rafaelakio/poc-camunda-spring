spring:
  application:
    name: poc-camunda-spring-embedded
  
  # Configuração do H2 Database (in-memory)
  datasource:
    url: jdbc:h2:mem:camunda;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  # Console H2 (para debug)
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

# Configurações do Camunda BPM
camunda:
  bpm:
    # Configurações gerais
    admin-user:
      id: demo
      password: demo
      firstName: Demo
      lastName: User
    
    # Configurações do banco de dados
    database:
      schema-update: true
    
    # Configurações de deployment automático
    auto-deployment-enabled: true
    
    # Configurações da aplicação web
    webapp:
      index-redirect-enabled: true
    
    # Configurações de histórico
    history-level: full

# Configurações da API de Cotação
currency:
  api:
    url: https://economia.awesomeapi.com.br/last/USD-BRL
    timeout: 10000

logging:
  level:
    org.camunda: INFO
    com.example: DEBUG
