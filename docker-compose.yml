version: '3.8'

services:
  # Elasticsearch - Armazenamento de dados
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.9.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - camunda-network
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

  # Zeebe Broker - Motor de workflow
  zeebe:
    image: camunda/zeebe:8.4.0
    container_name: zeebe
    environment:
      - ZEEBE_LOG_LEVEL=info
      - ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_CLASSNAME=io.camunda.zeebe.exporter.ElasticsearchExporter
      - ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_URL=http://elasticsearch:9200
      - ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_BULK_SIZE=1
    ports:
      - "26500:26500"
      - "9600:9600"
    networks:
      - camunda-network
    depends_on:
      - elasticsearch
    volumes:
      - zeebe-data:/usr/local/zeebe/data

  # Camunda Operate - Interface de monitoramento
  operate:
    image: camunda/operate:8.4.0
    container_name: operate
    environment:
      - CAMUNDA_OPERATE_ZEEBE_GATEWAYADDRESS=zeebe:26500
      - CAMUNDA_OPERATE_ELASTICSEARCH_URL=http://elasticsearch:9200
      - CAMUNDA_OPERATE_ZEEBEELASTICSEARCH_URL=http://elasticsearch:9200
    ports:
      - "8081:8080"
    networks:
      - camunda-network
    depends_on:
      - zeebe
      - elasticsearch

  # Camunda Tasklist - Interface de tarefas
  tasklist:
    image: camunda/tasklist:8.4.0
    container_name: tasklist
    environment:
      - CAMUNDA_TASKLIST_ZEEBE_GATEWAYADDRESS=zeebe:26500
      - CAMUNDA_TASKLIST_ELASTICSEARCH_URL=http://elasticsearch:9200
      - CAMUNDA_TASKLIST_ZEEBEELASTICSEARCH_URL=http://elasticsearch:9200
    ports:
      - "8082:8080"
    networks:
      - camunda-network
    depends_on:
      - zeebe
      - elasticsearch

networks:
  camunda-network:
    driver: bridge

volumes:
  elasticsearch-data:
  zeebe-data:
